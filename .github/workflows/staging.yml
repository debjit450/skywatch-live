name: Staging Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SKYWATCH_DEMO_MODE: "True"
      SKYWATCH_DEPLOYMENT_PROFILE: "staging"
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "staging-demo-secret-key-only-for-ci-smoke-tests-2026"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      ALLOW_IN_MEMORY_CHANNEL_LAYER: "True"
      DJANGO_ADMIN_URL_PATH: "staging-admin/"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: npm ci
        working-directory: frontend
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: python manage.py migrate --noinput
        working-directory: backend
      - run: python manage.py seed_demo_data
        working-directory: backend
      - run: npm run check
        working-directory: frontend
      - run: python manage.py test
        working-directory: backend
