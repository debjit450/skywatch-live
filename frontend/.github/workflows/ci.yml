name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: skywatch
          POSTGRES_USER: skywatch
          POSTGRES_PASSWORD: skywatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skywatch -d skywatch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "ci-only-secret-key-with-more-than-fifty-characters-2026"
      ALLOWED_HOSTS: "example.com"
      CSRF_TRUSTED_ORIGINS: "https://example.com"
      CORS_ALLOWED_ORIGINS: "https://example.com"
      DATABASE_URL: "postgres://skywatch:skywatch@localhost:5432/skywatch"
      REDIS_URL: "redis://localhost:6379/0"
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SECURE_HSTS_SECONDS: "31536000"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python manage.py check --deploy
      - run: python manage.py makemigrations --check --dry-run
